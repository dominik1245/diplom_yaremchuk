[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = config.settings"
python_files = ["test_*.py"]

[tool.black]
line-length = 100
target-version = ["py310"]
include = '\.pyi?$'
exclude = '''
/(
    \.git

  | \.hg
  | \.mypy_cache
  | \.nox

  | \.tox
  | \.venv
  | venv

  | _build
  | buck-out
  | build

  | dist
  | __pypackages__
  | migrations
)/
'''