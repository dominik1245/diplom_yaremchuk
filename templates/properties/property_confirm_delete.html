{% extends 'base.html' %}
{% block title %}Видалити оголошення — mobi home{% endblock %}

{% block content %}
<div class="wrap">
<div class="card card-premium card-body mb-4">
    <h1 class="h4 mb-3" style="color: var(--text);">Видалити оголошення?</h1>
    <p class="mb-3" style="color: var(--text);">Ви впевнені, що хочете видалити оголошення <strong>«{{ property.name }}»</strong>? Цю дію не можна скасувати.</p>
    <form method="post" action="{% url 'properties:delete_property' property.pk %}" class="d-flex flex-wrap gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Видалити</button>
        <a href="{% url 'properties:property_detail' property.pk %}" class="btn btn-outline-secondary">Скасувати</a>
    </form>
</div>
</div>
{% endblock %}
